<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keonbae - Stock Management System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css">
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f7f7f5;
      --bg-tertiary: #f1efe8;
      --bg-info: #e6f1fb;
      --bg-success: #eaf3de;
      --bg-warning: #faeeda;
      --bg-danger: #fcebeb;
      --text-primary: #191918;
      --text-secondary: #706f6c;
      --text-tertiary: #a5a5a0;
      --text-info: #185fa5;
      --text-success: #3b6d11;
      --text-warning: #854f0b;
      --text-danger: #a32d2d;
      --border-soft: rgba(25, 25, 24, 0.1);
      --border-medium: rgba(25, 25, 24, 0.2);
      --accent: #2a4d8f;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    
    :root[data-theme="dark"] {
      --bg-primary: #1a1a1a;
      --bg-secondary: #242424;
      --bg-tertiary: #0f0f0f;
      --bg-info: #0c447c;
      --bg-success: #27500a;
      --bg-warning: #633806;
      --bg-danger: #791f1f;
      --text-primary: #e8e8e7;
      --text-secondary: #a5a5a0;
      --text-tertiary: #706f6c;
      --text-info: #85b7eb;
      --text-success: #97c459;
      --text-warning: #ef9f27;
      --text-danger: #f09595;
      --border-soft: rgba(232, 232, 231, 0.1);
      --border-medium: rgba(232, 232, 231, 0.2);
      --accent: #5b87d4;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: var(--font);
      color: var(--text-primary);
      background: var(--bg-tertiary);
      min-height: 100vh;
      padding: 16px;
    }
    
    .container { max-width: 1500px; margin: 0 auto; }
    
    /* LOGIN */
    .login-box {
      background: var(--bg-primary);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 36px;
      max-width: 420px;
      margin: 80px auto;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    
    .login-box .brand {
      text-align: center;
      margin-bottom: 28px;
    }
    
    .login-box .brand-icon {
      width: 56px;
      height: 56px;
      background: var(--accent);
      border-radius: 16px;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 26px;
    }
    
    .login-box h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .login-box .subtitle {
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    /* APP LAYOUT */
    .app {
      display: flex;
      height: calc(100vh - 32px);
      min-height: 600px;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--bg-primary);
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    
    .sidebar {
      width: 240px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-soft);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    
    .sidebar-logo {
      padding: 20px;
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .sidebar-logo .icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
    }
    
    .sidebar-logo h1 {
      font-size: 16px;
      font-weight: 600;
    }
    
    .sidebar-logo p {
      font-size: 11px;
      color: var(--text-secondary);
    }
    
    .user-info {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border-soft);
    }
    
    .user-info .name {
      font-size: 14px;
      font-weight: 500;
    }
    
    .user-info .role {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: capitalize;
      margin-top: 2px;
    }
    
    .nav-section {
      padding: 12px 0;
      flex: 1;
      overflow-y: auto;
    }
    
    .nav-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 8px 20px 4px;
    }
    
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      font-size: 14px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s;
    }
    
    .nav-item:hover {
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    
    .nav-item.active {
      background: var(--bg-primary);
      color: var(--accent);
      font-weight: 500;
      border-left: 3px solid var(--accent);
      padding-left: 17px;
    }
    
    .nav-item i { font-size: 17px; }
    
    .nav-footer {
      padding: 12px;
      border-top: 1px solid var(--border-soft);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    /* MAIN */
    .main {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    
    .topbar {
      padding: 18px 28px;
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg-primary);
      z-index: 10;
    }
    
    .topbar h2 {
      font-size: 20px;
      font-weight: 600;
    }
    
    .role-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--bg-info);
      color: var(--text-info);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    
    .content { padding: 24px 28px; flex: 1; }
    
    /* CARDS */
    .cards-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    
    .metric-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 18px 20px;
      border: 1px solid var(--border-soft);
    }
    
    .metric-card .mlabel {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .metric-card .mval {
      font-size: 32px;
      font-weight: 600;
      line-height: 1;
    }
    
    .metric-card .msub {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 4px;
    }
    
    .mval.warn { color: var(--text-warning); }
    .mval.danger { color: var(--text-danger); }
    .mval.ok { color: var(--text-success); }
    
    /* PANELS */
    .panel {
      background: var(--bg-primary);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      margin-bottom: 20px;
      overflow: hidden;
    }
    
    .panel-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-secondary);
    }
    
    .panel-header h3 {
      font-size: 14px;
      font-weight: 600;
    }
    
    /* TABLES */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    
    th {
      padding: 11px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-soft);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    
    td {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border-soft);
    }
    
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg-secondary); }
    
    /* BADGES */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
      text-transform: capitalize;
    }
    
    .badge-pending { background: var(--bg-warning); color: var(--text-warning); }
    .badge-approved { background: var(--bg-info); color: var(--text-info); }
    .badge-dispatched { background: var(--bg-success); color: var(--text-success); }
    .badge-received { background: var(--bg-secondary); color: var(--text-secondary); }
    .badge-rejected, .badge-cancelled { background: var(--bg-danger); color: var(--text-danger); }
    .badge-low { background: var(--bg-danger); color: var(--text-danger); }
    .badge-ok { background: var(--bg-success); color: var(--text-success); }
    .badge-in { background: var(--bg-success); color: var(--text-success); }
    .badge-out { background: var(--bg-warning); color: var(--text-warning); }
    
    /* BUTTONS */
    .btn {
      border: 1px solid var(--border-medium);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
      font-family: var(--font);
      font-weight: 500;
    }
    
    .btn:hover { background: var(--bg-secondary); }
    
    .btn-primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    
    .btn-primary:hover { opacity: 0.88; background: var(--accent); }
    
    .btn-sm {
      font-size: 12px;
      padding: 5px 10px;
    }
    
    .btn-danger {
      color: var(--text-danger);
      border-color: var(--text-danger);
    }
    
    /* FORMS */
    input, select, textarea {
      font-family: var(--font);
      font-size: 14px;
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 100%;
    }
    
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    
    .form-group label {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    
    /* ALERTS */
    .alert {
      padding: 14px 18px;
      border-radius: var(--radius-md);
      font-size: 13px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .alert-warn { background: var(--bg-warning); color: var(--text-warning); }
    .alert-danger { background: var(--bg-danger); color: var(--text-danger); }
    .alert-success { background: var(--bg-success); color: var(--text-success); }
    
    .error {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 16px;
      background: var(--bg-danger);
      color: var(--text-danger);
    }
    
    /* STATES */
    .loading, .empty {
      padding: 60px 20px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 13px;
    }
    
    .empty i {
      font-size: 32px;
      display: block;
      margin-bottom: 8px;
      opacity: 0.5;
    }
    
    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    
    .modal {
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-soft);
      max-width: 600px;
      width: 100%;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    }
    
    .modal-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .modal-header h3 {
      font-size: 16px;
      font-weight: 600;
    }
    
    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
    }
    
    .modal-body {
      padding: 20px 24px;
      flex: 1;
      overflow-y: auto;
    }
    
    .modal-footer {
      padding: 14px 24px;
      border-top: 1px solid var(--border-soft);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    
    .order-item-row {
      display: grid;
      grid-template-columns: 1fr 80px 90px 90px 36px;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    
    /* STOCK BAR */
    .stock-bar-bg {
      height: 6px;
      background: var(--bg-secondary);
      border-radius: 3px;
      width: 100px;
      display: inline-block;
      vertical-align: middle;
    }
    
    .stock-bar-fill {
      height: 6px;
      border-radius: 3px;
    }
    
    /* FILTERS */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }
    
    .filters select {
      width: auto;
      min-width: 140px;
    }
    
    /* MOBILE MENU TOGGLE */
    .mobile-menu-toggle {
      display: none;
      background: var(--bg-primary);
      border: 1px solid var(--border-medium);
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--text-primary);
    }
    
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }
    
    /* RESPONSIVE - TABLET */
    @media (max-width: 1280px) {
      body { padding: 8px; }
      
      .sidebar {
        width: 220px;
      }
      
      .content {
        padding: 16px 20px;
      }
      
      .topbar {
        padding: 14px 20px;
      }
      
      .cards-row {
        grid-template-columns: repeat(2, 1fr);
      }
      
      table {
        font-size: 12px;
      }
      
      th, td {
        padding: 8px 12px;
      }
    }
    
    /* Always stack form rows in modals to prevent overlap on tablets */
    @media (max-width: 1200px) {
      .modal .form-row,
      .modal-body .form-row {
        display: flex !important;
        flex-direction: column !important;
        gap: 14px !important;
      }
      
      .modal .form-row > .form-group,
      .modal-body .form-row > .form-group {
        width: 100% !important;
        margin-bottom: 0 !important;
      }
      
      .modal input[type="date"],
      .modal input[type="text"],
      .modal input[type="email"],
      .modal input[type="number"],
      .modal select,
      .modal textarea {
        width: 100% !important;
        max-width: 100% !important;
        box-sizing: border-box !important;
      }
    }
    
    /* RESPONSIVE - MOBILE */
    @media (max-width: 768px) {
      body { padding: 0; }
      
      .app {
        height: 100vh;
        border-radius: 0;
        border: none;
        position: relative;
      }
      
      .container { padding: 0; }
      
      /* Slide-out sidebar */
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: 260px;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.25s ease-in-out;
        box-shadow: 2px 0 12px rgba(0,0,0,0.15);
      }
      
      .sidebar.open {
        transform: translateX(0);
      }
      
      .sidebar-overlay.show {
        display: block;
      }
      
      .mobile-menu-toggle {
        display: inline-flex;
      }
      
      .topbar {
        padding: 12px 16px;
        flex-wrap: wrap;
        gap: 8px;
      }
      
      .topbar h2 {
        font-size: 16px;
      }
      
      .role-badge {
        font-size: 10px;
        padding: 3px 8px;
      }
      
      .content {
        padding: 16px;
      }
      
      .main {
        width: 100%;
      }
      
      /* Cards stack on mobile */
      .cards-row {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      
      .metric-card {
        padding: 12px;
      }
      
      .metric-card .mval {
        font-size: 22px;
      }
      
      .metric-card .mlabel {
        font-size: 11px;
      }
      
      /* Tables become horizontally scrollable */
      .panel {
        margin-bottom: 14px;
      }
      
      .panel-header {
        padding: 12px 14px;
        flex-wrap: wrap;
        gap: 8px;
      }
      
      .panel-header h3 {
        font-size: 13px;
      }
      
      table {
        font-size: 11px;
      }
      
      th {
        padding: 8px 10px;
        font-size: 10px;
        white-space: nowrap;
      }
      
      td {
        padding: 8px 10px;
        white-space: nowrap;
      }
      
      /* Make tables scroll horizontally */
      .panel > table,
      .panel > div > table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
      }
      
      /* Forms stack vertically */
      .form-row {
        grid-template-columns: 1fr !important;
      }
      
      /* Modal full screen on mobile */
      .modal-overlay {
        padding: 0;
      }
      
      .modal {
        max-height: 100vh;
        height: 100vh;
        border-radius: 0;
        max-width: 100%;
      }
      
      .modal-header {
        padding: 14px 16px;
      }
      
      .modal-body {
        padding: 16px;
      }
      
      .modal-footer {
        padding: 12px 16px;
      }
      
      /* Order item rows stack on mobile */
      .order-item-row {
        grid-template-columns: 1fr;
        gap: 6px;
        margin-bottom: 14px;
        padding-bottom: 14px;
        border-bottom: 1px dashed var(--border-soft);
      }
      
      /* Touch-friendly buttons */
      .btn {
        padding: 10px 14px;
        font-size: 14px;
        min-height: 38px;
      }
      
      .btn-sm {
        padding: 7px 11px;
        font-size: 12px;
        min-height: 32px;
      }
      
      /* Login box mobile */
      .login-box {
        margin: 16px;
        padding: 24px;
        max-width: 100%;
      }
      
      /* Filters stack on mobile */
      .filters {
        flex-direction: column;
      }
      
      .filters select,
      .filters input {
        width: 100%;
        max-width: 100% !important;
      }
      
      input, select, textarea {
        font-size: 16px; /* Prevents zoom on iOS */
      }
    }
    
    /* RESPONSIVE - SMALL MOBILE */
    @media (max-width: 480px) {
      .cards-row {
        grid-template-columns: 1fr;
      }
      
      .topbar h2 {
        font-size: 14px;
      }
      
      .login-box {
        padding: 20px 16px;
      }
      
      .login-box h1 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="root"></div>
    <div id="modalContainer"></div>
  </div>

  <script>
    // ============== THEME ==============
    function initTheme() {
      const saved = localStorage.getItem('theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    }
    
    function toggleTheme() {
      const curr = document.documentElement.getAttribute('data-theme');
      const next = curr === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      render();
    }

    function toggleMobileSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      if (sidebar && overlay) {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('show');
      }
    }
    
    // Close sidebar when navigating on mobile
    
    // ============== STATE ==============
    const API = 'https://keonbae-stock-system.vercel.app/api';
    let state = {
      token: null,
      user: null,
      view: 'login',
      section: 'dashboard',
      orders: [],
      items: [],
      kitchenStock: [],
      restaurantStock: [],
      restaurants: [],
      movements: [],
      users: [],
      categories: [],
      units: [],
      filterCategory: 'all',
      filterSearch: '',
      selectedRestaurantId: null,
      showArchived: false,
      loading: false,
      error: null
    };
    
    // ============== API HELPERS ==============
    async function api(method, path, body) {
      const opts = {
        method,
        headers: { 'Content-Type': 'application/json' }
      };
      if (state.token) opts.headers.Authorization = `Bearer ${state.token}`;
      if (body) opts.body = JSON.stringify(body);
      
      const res = await fetch(`${API}${path}`, opts);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'Request failed');
      return data;
    }
    
    // ============== AUTH ==============
    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      state.loading = true;
      state.error = null;
      render();
      try {
        const data = await api('POST', '/auth/login', { email, password });
        state.token = data.token;
        state.user = data.user;
        state.view = 'app';
        state.loading = false;
        await loadDashboard();
        render();
      } catch (err) {
        state.error = err.message;
        state.loading = false;
        render();
      }
    }
    
    function logout() {
      state = {
        token: null, user: null, view: 'login', section: 'dashboard',
        orders: [], items: [], kitchenStock: [], restaurantStock: [],
        restaurants: [], movements: [], users: [], categories: [], units: [],
	filterCategory: 'all', filterSearch: '',
        loading: false, error: null
      };
      render();
    }
    
    // ============== ROLE HELPERS ==============
    const isAdmin = () => state.user?.role === 'administrator';
    const isCentral = () => state.user?.role === 'central_management';
    const isStaff = () => state.user?.role === 'restaurant_staff';
    const isPrivileged = () => isAdmin() || isCentral();
    
    // ============== NAVIGATION ==============
    function getNavItems() {
      if (isAdmin()) {
        return [
          { id: 'dashboard', icon: 'ti-layout-dashboard', label: 'Dashboard' },
          { id: 'orders', icon: 'ti-list-check', label: 'All Orders' },
          { id: 'restaurantStocks', icon: 'ti-building-store', label: 'Restaurant Stocks' },
          { id: 'lowStock', icon: 'ti-alert-triangle', label: 'Low Stock Alerts' },
          { id: 'movements', icon: 'ti-history', label: 'Stock Log' },
          { id: 'items', icon: 'ti-box', label: 'Item Management' },
          { id: 'restaurants', icon: 'ti-building-store', label: 'Restaurants' },
          { id: 'users', icon: 'ti-users', label: 'User Management' }
        ];
      }
      if (isCentral()) {
        return [
          { id: 'dashboard', icon: 'ti-layout-dashboard', label: 'Dashboard' },
          { id: 'orders', icon: 'ti-list-check', label: 'All Orders' },
          { id: 'restaurantStocks', icon: 'ti-building-store', label: 'Restaurant Stocks' },
          { id: 'lowStock', icon: 'ti-alert-triangle', label: 'Low Stock Alerts' },
          { id: 'movements', icon: 'ti-history', label: 'Stock Log' },
          { id: 'items', icon: 'ti-box', label: 'Item Management' }
        ];
      }
      // Restaurant staff
      return [
        { id: 'dashboard', icon: 'ti-layout-dashboard', label: 'Dashboard' },
        { id: 'myOrders', icon: 'ti-file-text', label: 'My Orders' },
        { id: 'newOrder', icon: 'ti-plus', label: 'New Order' },
        { id: 'myStock', icon: 'ti-package', label: 'My Stock' },
        { id: 'lowStock', icon: 'ti-alert-triangle', label: 'Low Stock Alerts' },
        { id: 'movements', icon: 'ti-history', label: 'Stock Log' }
      ];
    }
    
    async function navigate(section) {
      // Close mobile sidebar on navigation
      if (window.innerWidth <= 768) {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        if (sidebar) sidebar.classList.remove('open');
        if (overlay) overlay.classList.remove('show');
      }
      if (section === 'newOrder') {
        showNewOrderModal();
        return;
      }
      state.section = section;
      state.loading = true;
      render();
      
      try {
        if (section === 'dashboard') await loadDashboard();
        else if (section === 'orders' || section === 'myOrders') await loadOrders();
        else if (section === 'kitchenStock') await loadKitchenStock();
        else if (section === 'myStock') await loadRestaurantStock();
        else if (section === 'lowStock') await loadLowStock();
        else if (section === 'movements') await loadMovements();
        else if (section === 'items') await loadItems();
	else if (section === 'restaurantStocks') await loadRestaurantStocks();
        else if (section === 'restaurants') await loadRestaurants();
        else if (section === 'users') await loadUsers();
      } catch (err) {
        alert(err.message);
      }
      
      state.loading = false;
      render();
    }
    
    // ============== LOADERS ==============
    async function loadDashboard() {
      const promises = [api('GET', '/orders').then(d => state.orders = d)];
      if (isAdmin()) {
        // Admin sees both kitchen stock AND all restaurant stocks
        promises.push(api('GET', '/kitchen/stock').then(d => state.kitchenStock = d));
        const restaurants = await api('GET', '/restaurants');
        state.restaurants = restaurants;
        const allStocks = [];
        for (const r of restaurants) {
          const stocks = await api('GET', `/restaurant-stock/${r.id}`);
          allStocks.push(...stocks.map(s => ({ ...s, restaurant_name: r.name })));
        }
        state.restaurantStock = allStocks;
      } else if (isCentral()) {
        // Central management sees combined stock across all restaurants
        const restaurants = await api('GET', '/restaurants');
        state.restaurants = restaurants;
        const allStocks = [];
        for (const r of restaurants) {
          const stocks = await api('GET', `/restaurant-stock/${r.id}`);
          allStocks.push(...stocks.map(s => ({ ...s, restaurant_name: r.name })));
        }
        state.restaurantStock = allStocks;
      } else {
        promises.push(api('GET', `/restaurant-stock/${state.user.restaurant_id}`).then(d => state.restaurantStock = d));
      }
      await Promise.all(promises);
    }
    
    async function loadOrders() { 
      const url = state.showArchived ? '/orders?include_archived=true' : '/orders';
      state.orders = await api('GET', url); 
    }
    async function loadKitchenStock() { state.kitchenStock = await api('GET', '/kitchen/stock'); }
    async function loadRestaurantStock() {
      state.restaurantStock = await api('GET', `/restaurant-stock/${state.user.restaurant_id}`);
      if (!state.items.length) state.items = await api('GET', '/items');
    }
    async function loadLowStock() {
      if (isPrivileged()) {
        state.kitchenStock = await api('GET', '/kitchen/stock/low');
        const restaurants = await api('GET', '/restaurants');
        state.restaurants = restaurants;
        state.restaurantStock = [];
        state.lowStockReasons = [];
        for (const r of restaurants) {
          const rs = await api('GET', `/restaurant-stock/${r.id}/low`);
          state.restaurantStock.push(...rs.map(x => ({ ...x, restaurant_id: r.id, restaurant_name: r.name })));
          const reasons = await api('GET', `/low-stock-reasons/${r.id}`);
          state.lowStockReasons.push(...reasons.map(x => ({ ...x, restaurant_name: r.name })));
        }
      } else {
        state.restaurantStock = await api('GET', `/restaurant-stock/${state.user.restaurant_id}/low`);
        state.lowStockReasons = await api('GET', `/low-stock-reasons/${state.user.restaurant_id}`);
      }
    }
    async function loadMovements() {
      state.movements = await api('GET', '/movements?limit=200');
    }
    async function loadItems() {
      state.items = await api('GET', '/items');
      if (!state.categories.length) state.categories = await api('GET', '/items/meta/categories');
      if (!state.units.length) state.units = await api('GET', '/items/meta/units');
    }
    async function loadRestaurantStocks() {
      state.restaurants = await api('GET', '/restaurants');
      if (!state.selectedRestaurantId && state.restaurants.length > 0) {
        state.selectedRestaurantId = state.restaurants[0].id;
      }
      if (state.selectedRestaurantId) {
        state.restaurantStock = await api('GET', `/restaurant-stock/${state.selectedRestaurantId}`);
      }
    }
    
    async function selectRestaurantForStock(restaurantId) {
      state.selectedRestaurantId = restaurantId;
      state.restaurantStock = await api('GET', `/restaurant-stock/${restaurantId}`);
      render();
    }
    async function loadRestaurants() {
      state.restaurants = await api('GET', '/restaurants');
    }
    async function loadUsers() {
      state.users = await api('GET', '/users');
      if (!state.restaurants.length) state.restaurants = await api('GET', '/restaurants');
    }
    
    // ============== ORDER ACTIONS ==============
    async function approveOrder(id) {
      try { await api('PATCH', `/orders/${id}/approve`); await loadOrders(); render(); }
      catch (err) { alert(err.message); }
    }
    
    async function dispatchOrder(id) {
      try {
        await api('PATCH', `/orders/${id}/dispatch`);
        await loadOrders();
        await loadKitchenStock();
        render();
      } catch (err) { alert(err.message); }
    }
    
    async function receiveOrder(id) {
      try {
        await api('PATCH', `/orders/${id}/receive`);
        await loadOrders();
        if (isStaff()) await loadRestaurantStock();
        render();
      } catch (err) { alert(err.message); }
    }
    async function archiveOrder(id) {
      if (!confirm('Remove this order from the list? You can still view it by toggling "Show Archived".')) return;
      try {
        await api('PATCH', `/orders/${id}/archive`);
        await loadOrders();
        render();
      } catch (err) { alert(err.message); }
    }
    
    async function unarchiveOrder(id) {
      try {
        await api('PATCH', `/orders/${id}/unarchive`);
        await loadOrders();
        render();
      } catch (err) { alert(err.message); }
    }
    
    async function resolveReason(id) {
      try {
        await api('PATCH', `/low-stock-reasons/${id}/resolve`);
        await loadLowStock();
        render();
      } catch (err) { alert(err.message); }
    }
    
    async function toggleShowArchived() {
      state.showArchived = !state.showArchived;
      await loadOrders();
      render();
    }
    async function rejectOrder(id) {
      const reason = prompt('Please provide a reason for rejecting this order:');
      if (!reason || !reason.trim()) {
        if (reason !== null) alert('A rejection reason is required.');
        return;
      }
      try {
        await api('PATCH', `/orders/${id}/reject`, { reason: reason.trim() });
        await loadOrders();
        render();
      } catch (err) { alert(err.message); }
    }
    
    async function cancelOrder(id) {
      if (!confirm('Cancel this order?')) return;
      try { await api('PATCH', `/orders/${id}/cancel`); await loadOrders(); render(); }
      catch (err) { alert(err.message); }
    }
    
    // ============== NEW ORDER MODAL ==============
    async function showNewOrderModal() {
      if (!state.items.length) {
        try { state.items = await api('GET', '/items'); }
        catch (err) { alert(err.message); return; }
      }
      if (!state.units.length) {
        try { state.units = await api('GET', '/items/meta/units'); }
        catch (err) { alert(err.message); return; }
      }
      
      const html = `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal">
            <div class="modal-header">
              <h3><i class="ti ti-plus"></i> New Stock Order</h3>
              <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
            </div>
            <div class="modal-body">
              <div class="form-row">
                <div class="form-group">
                  <label>Date needed by</label>
                  <input type="date" id="neededDate" value="${new Date(Date.now()+5*86400000).toISOString().split('T')[0]}">
                </div>
                <div class="form-group">
                  <label>Notes (optional)</label>
                  <input type="text" id="orderNotes" placeholder="e.g. Weekend service">
                </div>
              </div>
              <div style="margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">
                <label style="font-size:12px;font-weight:600;text-transform:uppercase;color:var(--text-secondary)">Items to order</label>
                <button class="btn btn-sm" onclick="addOrderRow()"><i class="ti ti-plus"></i> Add row</button>
              </div>
              <div id="orderItems">${createOrderRow()}</div>
            </div>
            <div class="modal-footer">
              <button class="btn" onclick="closeModal()">Cancel</button>
              <button class="btn btn-primary" onclick="submitOrder()"><i class="ti ti-send"></i> Submit Order</button>
            </div>
          </div>
        </div>
      `;
      document.getElementById('modalContainer').innerHTML = html;
    }
    
    function createOrderRow() {
      // Group items by category for cleaner dropdown
      const grouped = {};
      state.items.forEach(i => {
        if (!grouped[i.category]) grouped[i.category] = [];
        grouped[i.category].push(i);
      });
      
      const itemOptions = Object.keys(grouped).sort().map(cat => `
        <optgroup label="${cat}">
          ${grouped[cat].map(i => `<option value="${i.id}" data-unit="${i.unit}">${i.sku ? '[' + i.sku + '] ' : ''}${i.name}</option>`).join('')}
        </optgroup>
      `).join('');
      
      return `
        <div class="order-item-row">
          <select class="item-select" onchange="updateItemUnit(this)">
            <option value="">Select item...</option>
            ${itemOptions}
          </select>
          <select class="qty-preset" onchange="updateQty(this)">
            <option value="">Qty</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="custom">Custom</option>
          </select>
          <input type="number" class="item-qty" placeholder="Amount" disabled>
          <select class="item-unit">
            <option value="">Unit</option>
            ${state.units.map(u => `<option value="${u}">${u}</option>`).join('')}
          </select>
          <button class="btn btn-sm btn-danger" onclick="this.parentElement.remove()" style="padding:6px;justify-content:center">
            <i class="ti ti-trash"></i>
          </button>
        </div>
      `;
    }
    
    function updateItemUnit(sel) {
      const row = sel.closest('.order-item-row');
      const unitSelect = row.querySelector('.item-unit');
      const option = sel.options[sel.selectedIndex];
      const unit = option.dataset.unit || '';
      if (unit) unitSelect.value = unit;
    }
    
    function updateQty(sel) {
      const row = sel.closest('.order-item-row');
      const qtyInput = row.querySelector('.item-qty');
      if (sel.value === 'custom') {
        qtyInput.value = '';
        qtyInput.disabled = false;
        qtyInput.focus();
      } else if (sel.value) {
        qtyInput.value = sel.value;
        qtyInput.disabled = false;
      } else {
        qtyInput.value = '';
        qtyInput.disabled = true;
      }
    }
    
    function addOrderRow() {
      const div = document.createElement('div');
      div.innerHTML = createOrderRow();
      document.getElementById('orderItems').appendChild(div.firstElementChild);
    }
    
    async function submitOrder() {
      const items = [];
      document.querySelectorAll('.order-item-row').forEach(row => {
        const sel = row.querySelector('.item-select');
        const qty = row.querySelector('.item-qty');
        if (sel.value && qty.value && parseFloat(qty.value) > 0) {
          items.push({ item_id: sel.value, quantity: parseFloat(qty.value) });
        }
      });
      
      if (!items.length) { alert('Please add at least one item with quantity'); return; }
      
      const notes = document.getElementById('orderNotes').value;
      const needed_by_date = document.getElementById('neededDate').value;
      
      closeModal();
      state.loading = true;
      render();
      
      try {
        await api('POST', '/orders', {
          restaurant_id: state.user.restaurant_id,
          items, notes, needed_by_date
        });
        await loadOrders();
        state.section = 'myOrders';
      } catch (err) {
        alert(err.message);
      }
      
      state.loading = false;
      render();
    }
    
    // ============== ITEM MANAGEMENT MODAL ==============
    function showItemModal(itemId) {
      const item = itemId ? state.items.find(i => i.id === itemId) : null;
      const html = `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal">
            <div class="modal-header">
              <h3><i class="ti ti-box"></i> ${item ? 'Edit Item' : 'Add New Item'}</h3>
              <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
            </div>
            <div class="modal-body">
              <div class="form-row">
                <div class="form-group">
                  <label>SKU</label>
                  <input type="text" id="itemSku" value="${item ? (item.sku || '') : ''}" placeholder="e.g. BOHJF-081">
                </div>
                <div class="form-group">
                  <label>Item Name</label>
                  <input type="text" id="itemName" value="${item ? item.name : ''}" placeholder="e.g. Salmon">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Category</label>
                  <select id="itemCategory">
                    <option value="">Select...</option>
                    ${state.categories.map(c => `<option value="${c}" ${item && item.category === c ? 'selected' : ''}>${c}</option>`).join('')}
                  </select>
                </div>
                <div class="form-group">
                  <label>Unit of Measurement</label>
                  <select id="itemUnit">
                    <option value="">Select...</option>
                    ${state.units.map(u => `<option value="${u}" ${item && item.unit === u ? 'selected' : ''}>${u}</option>`).join('')}
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label>Description (optional)</label>
                <textarea id="itemDesc" rows="2">${item ? (item.description || '') : ''}</textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn" onclick="closeModal()">Cancel</button>
              <button class="btn btn-primary" onclick="saveItem('${itemId || ''}')"><i class="ti ti-check"></i> Save</button>
            </div>
          </div>
        </div>
      `;
      document.getElementById('modalContainer').innerHTML = html;
    }
    
    async function saveItem(id) {
      const data = {
        name: document.getElementById('itemName').value,
        sku: document.getElementById('itemSku').value || null,
        category: document.getElementById('itemCategory').value,
        unit: document.getElementById('itemUnit').value,
        description: document.getElementById('itemDesc').value
      };
      if (!data.name || !data.category || !data.unit) {
        alert('Name, category and unit are required');
        return;
      }
      try {
        if (id) await api('PATCH', `/items/${id}`, data);
        else await api('POST', '/items', data);
        closeModal();
        await loadItems();
        render();
      } catch (err) { alert(err.message); }
    }
    
    // ============== USER MANAGEMENT MODAL ==============
    function showUserModal(userId) {
      const user = userId ? state.users.find(u => u.id === userId) : null;
      const html = `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal">
            <div class="modal-header">
              <h3><i class="ti ti-user"></i> ${user ? 'Edit User' : 'Add New User'}</h3>
              <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
            </div>
            <div class="modal-body">
              <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="userName" value="${user ? user.full_name : ''}">
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" id="userEmail" value="${user ? user.email : ''}">
              </div>
              <div class="form-group">
                <label>${user ? 'New Password (leave blank to keep)' : 'Password'}</label>
                <input type="password" id="userPassword">
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Role</label>
                  <select id="userRole">
                    <option value="administrator" ${user && user.role === 'administrator' ? 'selected' : ''}>Administrator</option>
                    <option value="central_management" ${user && user.role === 'central_management' ? 'selected' : ''}>Central Management</option>
                    <option value="restaurant_staff" ${user && user.role === 'restaurant_staff' ? 'selected' : ''}>Restaurant Staff</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Restaurant (if staff)</label>
                  <select id="userRestaurant">
                    <option value="">None</option>
                    ${state.restaurants.map(r => `<option value="${r.id}" ${user && user.restaurant_id === r.id ? 'selected' : ''}>${r.name}</option>`).join('')}
                  </select>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn" onclick="closeModal()">Cancel</button>
              <button class="btn btn-primary" onclick="saveUser('${userId || ''}')"><i class="ti ti-check"></i> Save</button>
            </div>
          </div>
        </div>
      `;
      document.getElementById('modalContainer').innerHTML = html;
    }
    
    async function saveUser(id) {
      const data = {
        full_name: document.getElementById('userName').value,
        email: document.getElementById('userEmail').value,
        role: document.getElementById('userRole').value,
        restaurant_id: document.getElementById('userRestaurant').value || null
      };
      const password = document.getElementById('userPassword').value;
      if (password) data.password = password;
      
      if (!data.full_name || !data.email || !data.role) {
        alert('Name, email and role are required');
        return;
      }
      if (!id && !password) { alert('Password required for new user'); return; }
      
      try {
        if (id) await api('PATCH', `/users/${id}`, data);
        else await api('POST', '/users', data);
        closeModal();
        await loadUsers();
        render();
      } catch (err) { alert(err.message); }
    }
    
    async function deleteUser(id) {
      if (!confirm('Delete this user permanently?')) return;
      try {
        await api('DELETE', `/users/${id}`);
        await loadUsers();
        render();
      } catch (err) { alert(err.message); }
    }
    
    function closeModal() {
      document.getElementById('modalContainer').innerHTML = '';
    }
    
    // ============== RENDER ==============
    function render() {
      const root = document.getElementById('root');
      
      if (state.view === 'login') {
        root.innerHTML = renderLogin();
        return;
      }
      
      root.innerHTML = `
        <div class="app">
            <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()"></div>

            <div class="sidebar-logo">
              <div class="icon"><i class="ti ti-building-store"></i></div>
              <div>
                <h1>Keonbae</h1>
                <p>Stock Management</p>
              </div>
            </div>
            <div class="user-info">
              <div class="name">${state.user.full_name}</div>
              <div class="role">${state.user.role.replace(/_/g, ' ')}</div>

            </div>

                <span>${document.documentElement.getAttribute('data-theme') === 'dark' ? 'Light' : 'Dark'} mode</span>

              </button>

          </div>
          <div class="main">
            <div class="topbar">
              <div style="display:flex;align-items:center;gap:10px">

                </button>
                <h2 id="pageTitle">${getSectionTitle()}</h2>
              </div>
              <span class="role-badge">${state.user.role.replace(/_/g, ' ')}</span>

            <div class="content">
              ${state.loading ? '<div class="loading"><i class="ti ti-loader"></i> Loading...</div>' : renderContent()}
            </div>
          </div>
