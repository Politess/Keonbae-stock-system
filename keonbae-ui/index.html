    }
    
    function renderLogin() {
      return `
        <div class="login-box">
          <div class="brand">
            <div class="brand-icon"><i class="ti ti-building-store"></i></div>
            <h1>Keonbae</h1>
            <p class="subtitle">Stock Management System</p>
          </div>
          ${state.error ? `<div class="error">${state.error}</div>` : ''}
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email" ${state.loading ? 'disabled' : ''}>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" ${state.loading ? 'disabled' : ''}>
          </div>
          <button class="btn btn-primary" style="width:100%;justify-content:center;padding:11px" onclick="login()" ${state.loading ? 'disabled' : ''}>
            ${state.loading ? '<i class="ti ti-loader"></i> Logging in...' : 'Login'}
          </button>
          <button class="btn btn-sm" onclick="toggleTheme()" style="width:100%;margin-top:14px;justify-content:center">
            <i class="ti ti-${document.documentElement.getAttribute('data-theme') === 'dark' ? 'sun' : 'moon'}"></i>
            ${document.documentElement.getAttribute('data-theme') === 'dark' ? 'Light' : 'Dark'} mode
          </button>
        </div>
      `;
    }
    
    function renderNav() {
      return getNavItems().map(it => `
        <div class="nav-item ${state.section === it.id ? 'active' : ''}" onclick="navigate('${it.id}')">
          <i class="ti ${it.icon}"></i><span>${it.label}</span>
        </div>
      `).join('');
    }
    
    function getSectionTitle() {
      const titles = {
        dashboard: 'Dashboard',
        orders: 'All Orders',
        myOrders: 'My Orders',
        kitchenStock: 'Kitchen Stock',
        restaurantStock: 'Restaurant Stocks',
        lowStock: 'Low Stock Alerts',
        movements: 'Stock Movement Log',
        items: 'Item Management',
        restaurants: 'Restaurants',
        users: 'User Management'
      };
      return titles[state.section] || 'Dashboard';
    }
    
    function renderContent() {
      const s = state.section;
      if (s === 'dashboard') return renderDashboard();
      if (s === 'orders' || s === 'myOrders') return renderOrders();
      if (s === 'kitchenStock') return renderKitchenStock();
      if (s === 'myStock') return renderMyStock();
      if (s === 'lowStock') return renderLowStock();
      if (s === 'movements') return renderMovements();
      if (s === 'items') return renderItems();
      if (s === 'restaurantStocks') return renderRestaurantStocks();
      if (s === 'restaurants') return renderRestaurants();
      if (s === 'users') return renderUsers();
      return '';
    }
    
    function renderDashboard() {
      const pending = state.orders.filter(o => o.status === 'pending').length;
      const approved = state.orders.filter(o => o.status === 'approved').length;
      const dispatched = state.orders.filter(o => o.status === 'dispatched').length;
      const stock = state.restaurantStock;
      const low = stock.filter(i => i.is_low).length;
      
      return `
        ${low > 0 ? `<div class="alert alert-warn">
          <i class="ti ti-alert-triangle"></i>
          <strong>${low}</strong> item${low > 1 ? 's' : ''} below minimum stock level.
          <button class="btn btn-sm" onclick="navigate('lowStock')" style="margin-left:auto">View alerts</button>
        </div>` : ''}
        
        <div class="cards-row">
          <div class="metric-card">
            <div class="mlabel"><i class="ti ti-file-text"></i> Total Orders</div>
            <div class="mval">${state.orders.length}</div>
            <div class="msub">All time</div>
          </div>
          <div class="metric-card">
            <div class="mlabel"><i class="ti ti-clock"></i> Pending</div>
            <div class="mval warn">${pending}</div>
            <div class="msub">Awaiting approval</div>
          </div>
          <div class="metric-card">
            <div class="mlabel"><i class="ti ti-truck"></i> In Transit</div>
            <div class="mval ok">${dispatched}</div>
            <div class="msub">On the way</div>
          </div>
          <div class="metric-card">
            <div class="mlabel"><i class="ti ti-alert-triangle"></i> Low Stock</div>
            <div class="mval ${low > 0 ? 'danger' : 'ok'}">${low}</div>
            <div class="msub">Below minimum</div>
          </div>
        </div>
        
        <div class="panel">
          <div class="panel-header">
            <h3>Recent Orders</h3>
            <button class="btn btn-sm" onclick="navigate('${isStaff() ? 'myOrders' : 'orders'}')">View all</button>
          </div>
          ${renderOrdersTable(state.orders.slice(0, 5))}
        </div>
        
        <div class="panel">
          <div class="panel-header">
            <h3>${isPrivileged() ? 'Restaurant Stocks' : 'My Stock'} Overview</h3>
            <button class="btn btn-sm" onclick="navigate('${isPrivileged() ? 'restaurantStocks' : 'myStock'}')">View all</button>
          </div>
          ${renderStockTable(stock.slice(0, 8))}
        </div>
      `;
    }
    
    function renderOrders() {
      return `
        <div style="display:flex;justify-content:space-between;margin-bottom:14px;align-items:center">
          ${isPrivileged() ? `
            <button class="btn" onclick="toggleShowArchived()">
              <i class="ti ti-${state.showArchived ? 'eye-off' : 'archive'}"></i>
              ${state.showArchived ? 'Hide Archived' : 'Show Archived'}
            </button>
          ` : '<div></div>'}
          ${isStaff() ? `
            <button class="btn btn-primary" onclick="navigate('newOrder')">
              <i class="ti ti-plus"></i> New Order
            </button>` : ''
          }
        </div>
        <div class="panel">
          <div class="panel-header">
            <h3>Orders ${state.showArchived ? '(including archived)' : ''}</h3>
            <div style="display:flex;gap:8px;align-items:center">
              <span style="font-size:12px;color:var(--text-secondary)">${state.orders.length} total</span>
            </div>
          </div>
          ${renderOrdersTable(state.orders)}
        </div>
      `;
    }
    
   function renderOrdersTable(orders) {
      if (!orders.length) return '<div class="empty"><i class="ti ti-inbox"></i>No orders yet</div>';
      return `
        <table>
          <thead>
            <tr>
              <th></th>
              <th>Order Ref</th>
              <th>Restaurant</th>
              <th>Date</th>
              <th>Requested By</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${orders.map(o => `
              <tr>
                <td style="width:30px">
                  <button class="btn btn-sm" onclick="toggleOrderDetails('${o.id}')" style="padding:4px 8px" id="toggle-${o.id}">
                    <i class="ti ti-chevron-right"></i>
                  </button>
                </td>
                <td style="font-weight:600">${o.order_ref}</td>
                <td>${o.restaurant}</td>
                <td style="color:var(--text-secondary)">${new Date(o.created_at).toLocaleDateString()}</td>
                <td style="color:var(--text-secondary)">${o.requested_by}</td>
                <td>
                  ${statusBadge(o.status)}
                  ${o.status === 'rejected' && o.rejection_reason ? 
                    `<div style="font-size:11px;color:var(--text-danger);margin-top:6px;font-style:italic;max-width:200px">
                      <i class="ti ti-info-circle"></i> ${o.rejection_reason}
                    </div>` : ''
                  }
                </td>
                <td>${renderOrderActions(o)}</td>
              </tr>
              <tr id="details-${o.id}" style="display:none;background:var(--bg-secondary)">
                <td colspan="7" style="padding:0">
                  <div id="details-content-${o.id}" style="padding:16px 20px">
                    <div class="loading"><i class="ti ti-loader"></i> Loading items...</div>
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }
    
    async function toggleOrderDetails(orderId) {
      const row = document.getElementById(`details-${orderId}`);
      const toggleBtn = document.getElementById(`toggle-${orderId}`);
      const icon = toggleBtn.querySelector('i');
      
      if (row.style.display === 'none') {
        row.style.display = 'table-row';
        icon.className = 'ti ti-chevron-down';
        
        // Load order details
        try {
          const order = await api('GET', `/orders/${orderId}`);
          const content = document.getElementById(`details-content-${orderId}`);
          
          content.innerHTML = `
            <div style="margin-bottom:14px;display:flex;gap:24px;flex-wrap:wrap;font-size:13px">
              ${order.needed_by_date ? `<div><strong>Needed by:</strong> ${new Date(order.needed_by_date).toLocaleDateString()}</div>` : ''}
              ${order.notes ? `<div><strong>Notes:</strong> ${order.notes}</div>` : ''}
              ${order.approved_at ? `<div><strong>Approved:</strong> ${new Date(order.approved_at).toLocaleString()}</div>` : ''}
              ${order.dispatched_at ? `<div><strong>Dispatched:</strong> ${new Date(order.dispatched_at).toLocaleString()}</div>` : ''}
              ${order.received_at ? `<div><strong>Received:</strong> ${new Date(order.received_at).toLocaleString()}</div>` : ''}
            </div>
            <table style="border:1px solid var(--border-soft);border-radius:var(--radius-sm)">
              <thead>
                <tr>
                  <th>SKU</th>
                  <th>Item</th>
                  <th>Category</th>
                  <th>Requested Qty</th>
                  ${order.status !== 'pending' ? '<th>Approved Qty</th>' : ''}
                </tr>
              </thead>
              <tbody>
                ${order.items.map(item => `
                  <tr>
                    <td style="font-family:monospace;font-size:11px;color:var(--text-secondary)">${item.sku || '-'}</td>
                    <td style="font-weight:500">${item.item_name}</td>
                    <td style="color:var(--text-secondary)">${item.category}</td>
                    <td>${parseFloat(item.requested_quantity).toFixed(1)} ${item.unit}</td>
                    ${order.status !== 'pending' ? 
                      `<td>${item.approved_quantity ? parseFloat(item.approved_quantity).toFixed(1) + ' ' + item.unit : '<span style="color:var(--text-tertiary)">Same as requested</span>'}</td>` 
                      : ''}
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
        } catch (err) {
          document.getElementById(`details-content-${orderId}`).innerHTML = 
            `<div class="error">Failed to load order details: ${err.message}</div>`;
        }
      } else {
        row.style.display = 'none';
        icon.className = 'ti ti-chevron-right';
      }
    }
    
    function renderOrderActions(o) {
      const actions = [];
      if (isPrivileged()) {
        if (o.status === 'pending') {
          actions.push(`<button class="btn btn-sm" onclick="approveOrder('${o.id}')"><i class="ti ti-check"></i> Approve</button>`);
          actions.push(`<button class="btn btn-sm btn-danger" onclick="rejectOrder('${o.id}')">Reject</button>`);
        }
        if (o.status === 'approved') {
          actions.push(`<button class="btn btn-sm btn-primary" onclick="dispatchOrder('${o.id}')"><i class="ti ti-truck"></i> Dispatch</button>`);
        }
        // Archive button for completed/rejected/cancelled orders
        if (['received', 'rejected', 'cancelled'].includes(o.status)) {
          if (o.is_archived) {
            actions.push(`<button class="btn btn-sm" onclick="unarchiveOrder('${o.id}')" title="Restore"><i class="ti ti-archive-off"></i></button>`);
          } else {
            actions.push(`<button class="btn btn-sm btn-danger" onclick="archiveOrder('${o.id}')" title="Remove from list"><i class="ti ti-archive"></i></button>`);
          }
        }
      }
      if (o.status === 'dispatched' && (isStaff() || isPrivileged())) {
        actions.push(`<button class="btn btn-sm" onclick="receiveOrder('${o.id}')"><i class="ti ti-circle-check"></i> Confirm</button>`);
      }
      return actions.length ? `<div style="display:flex;gap:6px">${actions.join('')}</div>` : '<span style="color:var(--text-tertiary)">-</span>';
    }
    
    function renderKitchenStock() {
      const filtered = applyFilters(state.kitchenStock);
      return `
        ${renderFilterBar(state.kitchenStock)}
        <div class="panel">
          <div class="panel-header">
            <h3>Kitchen Inventory</h3>
            <span style="font-size:12px;color:var(--text-secondary)">${filtered.length} of ${state.kitchenStock.length} items</span>
          </div>
          ${renderStockTable(filtered)}
        </div>
      `;
    }
    
    function renderMyStock() {
      const filtered = applyFilters(state.restaurantStock);
      return `
        <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
          <button class="btn btn-primary" onclick="showStockModal()">
            <i class="ti ti-plus"></i> Add / Update Stock
          </button>
        </div>
        ${renderFilterBar(state.restaurantStock)}
        <div class="panel">
          <div class="panel-header">
            <h3>${state.user.full_name}'s Restaurant Stock</h3>
            <span style="font-size:12px;color:var(--text-secondary)">${filtered.length} of ${state.restaurantStock.length} items</span>
          </div>
          ${filtered.length === 0 ? `
            <div class="empty">
              <i class="ti ti-package"></i>
              No stock items yet. Click "Add / Update Stock" to add items.
            </div>
          ` : `
            <table>
              <thead>
                <tr><th>SKU</th><th>Item</th><th>Category</th><th>Quantity</th><th>Minimum</th><th>Level</th><th>Status</th><th>Actions</th></tr>
              </thead>
              <tbody>
                ${filtered.map(i => {
                  const qty = parseFloat(i.quantity);
                  const min = parseFloat(i.min_quantity);
                  const pct = Math.min(100, (qty / Math.max(min * 2, 1)) * 100);
                  const col = qty < min ? '#E24B4A' : qty < min * 1.3 ? '#BA7517' : '#1D9E75';
                  return `
                    <tr>
                      <td style="font-family:monospace;font-size:11px;color:var(--text-secondary)">${i.sku || '-'}</td>
                      <td style="font-weight:500">${i.name}</td>
                      <td style="color:var(--text-secondary)">${i.category}</td>
                      <td>${qty.toFixed(1)} ${i.unit}</td>
                      <td style="color:var(--text-secondary)">${min.toFixed(1)} ${i.unit}</td>
                      <td><div class="stock-bar-bg"><div class="stock-bar-fill" style="width:${pct}%;background:${col}"></div></div></td>
                      <td>${i.is_low ? '<span class="badge badge-low">Low</span>' : '<span class="badge badge-ok">OK</span>'}</td>
                      <td style="display:flex;gap:6px">
                        <button class="btn btn-sm" onclick="showStockModal('${i.item_id}')">
                          <i class="ti ti-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteStockItem('${i.item_id}')">
                          <i class="ti ti-trash"></i>
                        </button>
                      </td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          `}
        </div>
      `;
    }
    
    async function showStockModal(itemId) {
      if (!state.items.length) {
        state.items = await api('GET', '/items');
      }
      if (!state.units.length) {
        state.units = await api('GET', '/items/meta/units');
      }
      
      const existing = itemId ? state.restaurantStock.find(s => s.item_id === itemId) : null;
      const item = existing ? state.items.find(i => i.id === itemId) : null;
      
      // Items already in stock (to grey out in dropdown when adding new)
      const inStockIds = new Set(state.restaurantStock.map(s => s.item_id));
      
      // Group items by category
      const grouped = {};
      state.items.forEach(i => {
        if (!grouped[i.category]) grouped[i.category] = [];
        grouped[i.category].push(i);
      });
      
      const itemOptions = Object.keys(grouped).sort().map(cat => `
        <optgroup label="${cat}">
          ${grouped[cat].map(i => {
            const inStock = inStockIds.has(i.id);
            return `<option value="${i.id}" data-unit="${i.unit}" ${existing && item && item.id === i.id ? 'selected' : ''} ${!existing && inStock ? 'disabled' : ''}>${i.sku ? '[' + i.sku + '] ' : ''}${i.name} ${!existing && inStock ? '(already in stock)' : ''}</option>`;
          }).join('')}
        </optgroup>
      `).join('');
      
      const html = `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal">
            <div class="modal-header">
              <h3><i class="ti ti-package"></i> ${existing ? 'Edit Stock' : 'Add Stock Item'}</h3>
              <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
            </div>
            <div class="modal-body">
              <div class="form-group">
                <label>Item</label>
                <select id="stockItemId" ${existing ? 'disabled' : ''} onchange="updateStockUnit(this)">
                  <option value="">Select item...</option>
                  ${itemOptions}
                </select>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Current Stock Quantity</label>
                  <input type="number" id="stockQty" step="0.1" min="0" 
                         value="${existing ? parseFloat(existing.quantity) : ''}"
                         placeholder="e.g. 20" oninput="updateStockStatus()">
                </div>
                <div class="form-group">
                  <label>Minimum Stock Level</label>
                  <input type="number" id="stockMin" step="0.1" min="0"
                         value="${existing ? parseFloat(existing.min_quantity) : ''}"
                         placeholder="e.g. 5" oninput="updateStockStatus()">
                </div>
              </div>
              <div class="form-group">
                <label>Unit of Measurement</label>
                <select id="stockUnit">
                  <option value="">Select unit...</option>
                  ${state.units.map(u => `<option value="${u}" ${existing && existing.unit === u ? 'selected' : ''}>${u}</option>`).join('')}
                </select>
              </div>
              <div class="form-group">
                <label>Status (auto-calculated)</label>
                <div id="stockStatusDisplay" style="padding:10px;background:var(--bg-secondary);border-radius:var(--radius-sm)">
                  <span class="badge ${existing && parseFloat(existing.quantity) < parseFloat(existing.min_quantity) ? 'badge-low' : 'badge-ok'}">
                    ${existing && parseFloat(existing.quantity) < parseFloat(existing.min_quantity) ? 'Low Stock' : 'OK'}
                  </span>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn" onclick="closeModal()">Cancel</button>
              <button class="btn btn-primary" onclick="saveStock('${itemId || ''}')">
                <i class="ti ti-check"></i> Save
              </button>
            </div>
          </div>
        </div>
      `;
      document.getElementById('modalContainer').innerHTML = html;
    }
    
    function updateStockUnit(sel) {
      const unit = sel.options[sel.selectedIndex]?.dataset?.unit || '';
      const unitSelect = document.getElementById('stockUnit');
      if (unitSelect && unit) unitSelect.value = unit;
    }
    
    function updateStockStatus() {
      const qty = parseFloat(document.getElementById('stockQty').value) || 0;
      const min = parseFloat(document.getElementById('stockMin').value) || 0;
      const display = document.getElementById('stockStatusDisplay');
      if (qty < min && min > 0) {
        display.innerHTML = '<span class="badge badge-low">Low Stock</span>';
      } else {
        display.innerHTML = '<span class="badge badge-ok">OK</span>';
      }
    }
    
    async function saveStock(existingItemId) {
      const itemId = existingItemId || document.getElementById('stockItemId').value;
      const quantity = parseFloat(document.getElementById('stockQty').value);
      const min_quantity = parseFloat(document.getElementById('stockMin').value);
      const unit = document.getElementById('stockUnit').value;
      
      if (!itemId) { alert('Please select an item'); return; }
      if (isNaN(quantity) || quantity < 0) { alert('Please enter a valid quantity'); return; }
      if (isNaN(min_quantity) || min_quantity < 0) { alert('Please enter a valid minimum'); return; }
      if (!unit) { alert('Please select a unit'); return; }
      
      // If quantity is below minimum, prompt for a reason
      if (quantity < min_quantity && min_quantity > 0) {
        closeModal();
        showLowStockReasonModal(itemId, quantity, min_quantity, unit);
        return;
      }
      
      try {
        await api('PATCH', `/items/${itemId}`, { unit });
        await api('PUT', `/restaurant-stock/${state.user.restaurant_id}/${itemId}`, {
          quantity, min_quantity
        });
        closeModal();
        await loadRestaurantStock();
        render();
      } catch (err) { alert(err.message); }
    }
    
    function showLowStockReasonModal(itemId, quantity, min_quantity, unit) {
      const item = state.items.find(i => i.id === itemId);
      const reasons = [
        'Busy week',
        'Portion overused',
        'Expired',
        'Bad quality',
        'Chef error',
        'Staff error',
        'Theft',
        'Spillage / damaged',
        'Other'
      ];
      
      const html = `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal">
            <div class="modal-header">
              <h3><i class="ti ti-alert-triangle" style="color:var(--text-warning)"></i> Low Stock Reason Required</h3>
              <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
            </div>
            <div class="modal-body">
              <div class="alert alert-warn">
                <i class="ti ti-info-circle"></i>
                <div>
                  <strong>${item.name}</strong> is below minimum stock level.<br>
                  Current: ${quantity} ${unit} &nbsp;|&nbsp; Minimum: ${min_quantity} ${unit}
                </div>
              </div>
              <div class="form-group">
                <label>Reason for low stock <span style="color:var(--text-danger)">*</span></label>
                <select id="lowStockReason">
                  <option value="">Select a reason...</option>
                  ${reasons.map(r => `<option value="${r}">${r}</option>`).join('')}
                </select>
              </div>
              <div class="form-group">
                <label>Additional notes (optional)</label>
                <textarea id="lowStockNotes" rows="3" placeholder="Provide more context if needed..."></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn" onclick="closeModal()">Cancel</button>
              <button class="btn btn-primary" onclick="submitLowStockReason('${itemId}', ${quantity}, ${min_quantity}, '${unit}')">
                <i class="ti ti-check"></i> Save Stock & Reason
              </button>
            </div>
          </div>
        </div>
      `;
      document.getElementById('modalContainer').innerHTML = html;
    }
    
    async function submitLowStockReason(itemId, quantity, min_quantity, unit) {
      const reason = document.getElementById('lowStockReason').value;
      const notes = document.getElementById('lowStockNotes').value;
      
      if (!reason) { alert('Please select a reason'); return; }
      
      try {
        // Update item unit if changed
        await api('PATCH', `/items/${itemId}`, { unit });
        // Save the stock
        await api('PUT', `/restaurant-stock/${state.user.restaurant_id}/${itemId}`, {
          quantity, min_quantity
        });
        // Record the low stock reason
        await api('POST', '/low-stock-reasons', {
          restaurant_id: state.user.restaurant_id,
          item_id: itemId,
          reason,
          notes,
          quantity_at_report: quantity,
          min_quantity_at_report: min_quantity
        });
        closeModal();
        await loadRestaurantStock();
        render();
      } catch (err) { alert(err.message); }
    }
    
    async function deleteStockItem(itemId) {
      if (!confirm('Remove this item from your stock?')) return;
      try {
        await api('DELETE', `/restaurant-stock/${state.user.restaurant_id}/${itemId}`);
        await loadRestaurantStock();
        render();
      } catch (err) { alert(err.message); }
    }
    
    function renderFilterBar(items) {
      const categories = [...new Set(items.map(i => i.category))].sort();
      return `
        <div class="filters">
          <select onchange="setFilter('category', this.value)">
            <option value="all" ${state.filterCategory === 'all' ? 'selected' : ''}>All Categories</option>
            ${categories.map(c => `<option value="${c}" ${state.filterCategory === c ? 'selected' : ''}>${c}</option>`).join('')}
          </select>
          <input type="text" placeholder="Search by name or SKU..." 
                 value="${state.filterSearch || ''}"
                 oninput="setFilter('search', this.value)"
                 style="max-width:300px">
          ${(state.filterCategory && state.filterCategory !== 'all') || (state.filterSearch && state.filterSearch.length > 0) ? `
            <button class="btn btn-sm" onclick="clearFilters()">
              <i class="ti ti-x"></i> Clear filters
            </button>` : ''}
        </div>
      `;
    }
    
    function applyFilters(items) {
      let filtered = items;
      if (state.filterCategory !== 'all') {
        filtered = filtered.filter(i => i.category === state.filterCategory);
      }
      if (state.filterSearch) {
        const q = state.filterSearch.toLowerCase();
        filtered = filtered.filter(i => 
          i.name.toLowerCase().includes(q) || 
          (i.sku && i.sku.toLowerCase().includes(q))
        );
      }
      return filtered;
    }
    
    function setFilter(type, value) {
      if (type === 'category') state.filterCategory = value;
      if (type === 'search') state.filterSearch = value;
      const activeEl = document.activeElement;
      const isSearchInput = activeEl && activeEl.placeholder && activeEl.placeholder.includes('Search');
      const cursorPos = isSearchInput ? activeEl.selectionStart : null;
      render();
      if (isSearchInput) {
        const newInput = document.querySelector('input[placeholder*="Search"]');
        if (newInput) {
          newInput.focus();
          if (cursorPos !== null) newInput.setSelectionRange(cursorPos, cursorPos);
        }
      }
    }
    
    function clearFilters() {
      state.filterCategory = 'all';
      state.filterSearch = '';
      render();
    }
    
    function renderStockTable(stock) {
      if (!stock.length) return '<div class="empty"><i class="ti ti-package"></i>No stock items</div>';
      return `
        <table>
          <thead>
            <tr><th>SKU</th><th>Item</th><th>Category</th><th>Quantity</th><th>Minimum</th><th>Level</th><th>Status</th></tr>
          </thead>
          <tbody>
            ${stock.map(i => {
              const qty = parseFloat(i.quantity);
              const min = parseFloat(i.min_quantity);
              const pct = Math.min(100, (qty / Math.max(min * 2, 1)) * 100);
              const col = qty < min ? '#E24B4A' : qty < min * 1.3 ? '#BA7517' : '#1D9E75';
              return `
                <tr>
                  <td style="font-family:monospace;font-size:11px;color:var(--text-secondary)">${i.sku || '-'}</td>
                  <td style="font-weight:500">${i.name}</td>
                  <td style="color:var(--text-secondary)">${i.category}</td>
                  <td>${qty.toFixed(1)} ${i.unit}</td>
                  <td style="color:var(--text-secondary)">${min.toFixed(1)} ${i.unit}</td>
                  <td><div class="stock-bar-bg"><div class="stock-bar-fill" style="width:${pct}%;background:${col}"></div></div></td>
                  <td>${i.is_low ? '<span class="badge badge-low">Low</span>' : '<span class="badge badge-ok">OK</span>'}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
    }
    
    function renderLowStock() {
      const kitchenLow = state.kitchenStock.filter(i => i.shortfall || i.is_low);
      const restaurantLow = state.restaurantStock;
      
      return `
        ${isPrivileged() && kitchenLow.length > 0 ? `
          <div class="panel">
            <div class="panel-header">
              <h3><i class="ti ti-building-warehouse"></i> Kitchen Low Stock</h3>
              <span style="font-size:12px;color:var(--text-danger)">${kitchenLow.length} alerts</span>
            </div>
            <table>
              <thead>
                <tr><th>Item</th><th>Category</th><th>Current</th><th>Minimum</th><th>Shortfall</th></tr>
              </thead>
              <tbody>
                ${kitchenLow.map(i => `
                  <tr>
                    <td style="font-weight:500">${i.name}</td>
                    <td style="color:var(--text-secondary)">${i.category}</td>
                    <td style="color:var(--text-danger)">${parseFloat(i.current_qty || i.quantity).toFixed(1)} ${i.unit}</td>
                    <td>${parseFloat(i.min_qty || i.min_quantity).toFixed(1)} ${i.unit}</td>
                    <td><strong>${parseFloat(i.shortfall || (i.min_quantity - i.quantity)).toFixed(1)} ${i.unit}</strong></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>` : ''
        }
        
        ${restaurantLow.length > 0 ? `
          <div class="panel">
            <div class="panel-header">
              <h3><i class="ti ti-building-store"></i> Restaurant Low Stock</h3>
              <span style="font-size:12px;color:var(--text-danger)">${restaurantLow.length} alerts</span>
            </div>
            <table>
              <thead>
                <tr>${isPrivileged() ? '<th>Restaurant</th>' : ''}<th>Item</th><th>Category</th><th>Current</th><th>Minimum</th><th>Shortfall</th>${isStaff() ? '<th>Action</th>' : ''}</tr>
              </thead>
              <tbody>
                ${restaurantLow.map(i => `
                  <tr>
                    ${isPrivileged() ? `<td>${i.restaurant_name || i.restaurant}</td>` : ''}
                    <td style="font-weight:500">${i.item || i.name}</td>
                    <td style="color:var(--text-secondary)">${i.category}</td>
                    <td style="color:var(--text-danger)">${parseFloat(i.current_qty || i.quantity).toFixed(1)} ${i.unit}</td>
                    <td>${parseFloat(i.min_qty || i.min_quantity).toFixed(1)} ${i.unit}</td>
                    <td><strong>${parseFloat(i.shortfall || (i.min_quantity - i.quantity)).toFixed(1)} ${i.unit}</strong></td>
                    ${isStaff() ? `<td><button class="btn btn-sm btn-primary" onclick="navigate('newOrder')"><i class="ti ti-plus"></i> Order</button></td>` : ''}
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>` : ''
        }
        
        ${kitchenLow.length === 0 && restaurantLow.length === 0 ? 
          `<div class="alert alert-success">
            <i class="ti ti-circle-check"></i>
            All stock levels are healthy. No alerts.
          </div>` : ''
        }
        
        ${state.lowStockReasons && state.lowStockReasons.length > 0 ? `
          <div class="panel">
            <div class="panel-header">
              <h3><i class="ti ti-clipboard-list"></i> Low Stock Incident Reports</h3>
              <span style="font-size:12px;color:var(--text-secondary)">${state.lowStockReasons.filter(r => !r.is_resolved).length} unresolved</span>
            </div>
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  ${isPrivileged() ? '<th>Restaurant</th>' : ''}
                  <th>Item</th>
                  <th>Reason</th>
                  <th>Notes</th>
                  <th>Reported By</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                ${state.lowStockReasons.map(r => `
                  <tr>
                    <td style="color:var(--text-secondary);font-size:12px">${new Date(r.created_at).toLocaleString()}</td>
                    ${isPrivileged() ? `<td>${r.restaurant_name}</td>` : ''}
                    <td style="font-weight:500">${r.item_name} <span style="font-family:monospace;font-size:11px;color:var(--text-secondary)">[${r.sku || ''}]</span></td>
                    <td><span class="badge badge-pending">${r.reason}</span></td>
                    <td style="font-size:12px;color:var(--text-secondary)">${r.notes || '-'}</td>
                    <td style="font-size:12px;color:var(--text-secondary)">${r.reported_by_name || '-'}</td>
                    <td>${r.is_resolved ? '<span class="badge badge-ok">Resolved</span>' : `<button class="btn btn-sm" onclick="resolveReason('${r.id}')">Mark Resolved</button>`}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        ` : ''}
      `;
    }
    
    function renderMovements() {
      return `
        <div class="panel">
          <div class="panel-header">
            <h3>Stock Movement Log</h3>
            <span style="font-size:12px;color:var(--text-secondary)">${state.movements.length} entries</span>
          </div>
          ${state.movements.length === 0 ? '<div class="empty"><i class="ti ti-history"></i>No movements recorded yet</div>' : `
            <table>
              <thead>
                <tr>
                  <th>Date/Time</th><th>Item</th><th>Direction</th><th>Qty</th>
                  <th>Source</th><th>Order</th><th>Restaurant</th><th>By</th>
                  ${isAdmin() ? '<th>Actions</th>' : ''}
                </tr>
              </thead>
              <tbody>
                ${state.movements.map(m => `
                  <tr>
                    <td style="color:var(--text-secondary);font-size:12px">${new Date(m.created_at).toLocaleString()}</td>
                    <td style="font-weight:500">${m.item_name}</td>
                    <td><span class="badge badge-${m.direction.toLowerCase()}">${m.direction === 'IN' ? '↑ IN' : '↓ OUT'}</span></td>
                    <td>${parseFloat(m.quantity).toFixed(1)} ${m.unit}</td>
                    <td style="color:var(--text-secondary)">${m.source.replace(/_/g, ' ')}</td>
                    <td style="font-size:12px">${m.order_ref || '-'}</td>
                    <td style="font-size:12px">${m.restaurant_name || 'Kitchen'}</td>
                    <td style="color:var(--text-secondary);font-size:12px">${m.performed_by || '-'}</td>
                    ${isAdmin() ? `
                      <td>
                        <button class="btn btn-sm btn-danger" onclick="deleteMovement('${m.id}')" title="Delete log entry">
                          <i class="ti ti-trash"></i>
                        </button>
                      </td>
                    ` : ''}
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `}
        </div>
      `;
    }
    
    async function deleteMovement(id) {
      if (!confirm('Delete this stock log entry? This action cannot be undone.')) return;
      try {
        await api('DELETE', `/movements/${id}`);
        await loadMovements();
        render();
      } catch (err) { alert(err.message); }
    }
    
    function renderItems() {
      const filtered = applyFilters(state.items);
      return `
        <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
          <button class="btn btn-primary" onclick="showItemModal()"><i class="ti ti-plus"></i> Add Item</button>
        </div>
        ${renderFilterBar(state.items)}
        <div class="panel">
          <div class="panel-header">
            <h3>Item Catalogue</h3>
            <span style="font-size:12px;color:var(--text-secondary)">${filtered.length} of ${state.items.length} items</span>
          </div>
          ${filtered.length === 0 ? '<div class="empty"><i class="ti ti-box"></i>No items match your filters</div>' : `
            <table>
              <thead>
                <tr><th>SKU</th><th>Name</th><th>Category</th><th>Unit</th><th>Status</th><th>Actions</th></tr>
              </thead>
              <tbody>
                ${filtered.map(i => `
                  <tr>
                    <td style="font-family:monospace;font-size:11px;color:var(--text-secondary)">${i.sku || '-'}</td>
                    <td style="font-weight:500">${i.name}</td>
                    <td>${i.category}</td>
                    <td>${i.unit}</td>
                    <td>${i.is_active ? '<span class="badge badge-ok">Active</span>' : '<span class="badge badge-low">Inactive</span>'}</td>
                    <td><button class="btn btn-sm" onclick="showItemModal('${i.id}')"><i class="ti ti-edit"></i> Edit</button></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `}
        </div>
      `;
    }
    function renderRestaurantStocks() {
      const filtered = applyFilters(state.restaurantStock);
      const currentRestaurant = state.restaurants.find(r => r.id === state.selectedRestaurantId);
      const lowCount = state.restaurantStock.filter(i => i.is_low).length;
      
      return `
        <div class="panel" style="margin-bottom:16px">
          <div class="panel-header">
            <h3><i class="ti ti-building-store"></i> Select Restaurant</h3>
          </div>
          <div style="padding:16px;display:flex;gap:10px;flex-wrap:wrap">
            ${state.restaurants.map(r => `
              <button class="btn ${state.selectedRestaurantId === r.id ? 'btn-primary' : ''}" 
                      onclick="selectRestaurantForStock('${r.id}')">
                <i class="ti ti-building-store"></i> ${r.name}
                <span style="font-size:11px;opacity:0.7;margin-left:4px">${r.location || ''}</span>
              </button>
            `).join('')}
          </div>
        </div>
        
        ${currentRestaurant ? `
          <div class="cards-row">
            <div class="metric-card">
              <div class="mlabel"><i class="ti ti-package"></i> Total Items</div>
              <div class="mval">${state.restaurantStock.length}</div>
              <div class="msub">In stock</div>
            </div>
            <div class="metric-card">
              <div class="mlabel"><i class="ti ti-alert-triangle"></i> Low Stock</div>
              <div class="mval ${lowCount > 0 ? 'danger' : 'ok'}">${lowCount}</div>
              <div class="msub">Below minimum</div>
            </div>
            <div class="metric-card">
              <div class="mlabel"><i class="ti ti-circle-check"></i> Healthy</div>
              <div class="mval ok">${state.restaurantStock.length - lowCount}</div>
              <div class="msub">At or above minimum</div>
            </div>
          </div>
          
          ${renderFilterBar(state.restaurantStock)}
          
          <div class="panel">
            <div class="panel-header">
              <h3>${currentRestaurant.name} — Stock Levels</h3>
              <span style="font-size:12px;color:var(--text-secondary)">${filtered.length} of ${state.restaurantStock.length} items</span>
            </div>
            ${renderStockTable(filtered)}
          </div>
        ` : '<div class="empty"><i class="ti ti-building-store"></i>Select a restaurant to view its stock</div>'}
      `;
    }
    function renderRestaurants() {
      return `
        <div class="panel">
          <div class="panel-header">
            <h3>Restaurants</h3>
            <span style="font-size:12px;color:var(--text-secondary)">${state.restaurants.length} branches</span>
          </div>
          <table>
            <thead>
              <tr><th>Name</th><th>Location</th><th>Email</th><th>Status</th></tr>
            </thead>
            <tbody>
              ${state.restaurants.map(r => `
                <tr>
                  <td style="font-weight:500">${r.name}</td>
                  <td>${r.location || '-'}</td>
                  <td style="color:var(--text-secondary)">${r.contact_email || '-'}</td>
                  <td>${r.is_active ? '<span class="badge badge-ok">Active</span>' : '<span class="badge badge-low">Inactive</span>'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }
    
    function renderUsers() {
      return `
        <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
          <button class="btn btn-primary" onclick="showUserModal()"><i class="ti ti-user-plus"></i> Add User</button>
        </div>
        <div class="panel">
          <div class="panel-header">
            <h3>Users</h3>
            <span style="font-size:12px;color:var(--text-secondary)">${state.users.length} users</span>
          </div>
          <table>
            <thead>
              <tr><th>Name</th><th>Email</th><th>Role</th><th>Restaurant</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody>
              ${state.users.map(u => `
                <tr>
                  <td style="font-weight:500">${u.full_name}</td>
                  <td style="color:var(--text-secondary)">${u.email}</td>
                  <td>${u.role.replace(/_/g, ' ')}</td>
                  <td>${u.restaurant_name || '-'}</td>
                  <td>${u.is_active ? '<span class="badge badge-ok">Active</span>' : '<span class="badge badge-low">Inactive</span>'}</td>
                  <td style="display:flex;gap:6px">
                    <button class="btn btn-sm" onclick="showUserModal('${u.id}')"><i class="ti ti-edit"></i></button>
                    ${u.id !== state.user.id ? `<button class="btn btn-sm btn-danger" onclick="deleteUser('${u.id}')"><i class="ti ti-trash"></i></button>` : ''}
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }
    
    function statusBadge(s) {
      return `<span class="badge badge-${s}">${s}</span>`;
    }
    
    // ============== INIT ==============
    initTheme();
    render();
  </script>
</body>
</html>
